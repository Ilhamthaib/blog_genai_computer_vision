  <rect x="8" y="144" width="180" height="8" rx="4" fill="#0e6e55"/>
  <text x="190" y="153" font-size="10" fill="#0e6e55">Rapide</text>
  <rect x="228" y="144" width="194" height="8" rx="4" fill="#e8e3db"/>
  <rect x="228" y="144" width="174" height="8" rx="4" fill="#0e6e55"/>
